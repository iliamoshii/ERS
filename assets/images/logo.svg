<svg width="250" height="80" viewBox="0 0 250 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.5" result="blur" />
            <feOffset dx="0" dy="0" result="offsetblur" />
            <feFlood flood-color="#39FF14" />
            <feComposite in2="offsetblur" operator="in" />
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#39FF14;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00df14;stop-opacity:1" />
        </linearGradient>
    </defs>

    <g transform="translate(10, 5)" filter="url(#neonGlow)">
        <path d="M10 40 C 10 10, 60 10, 60 40 C 60 70, 10 70, 10 40" fill="none" stroke="url(#mainGrad)" stroke-width="2.5" />
        <path d="M15 40 C 15 20, 55 20, 55 40 C 55 60, 15 60, 15 40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6" />

        <circle cx="35" cy="40" r="12" fill="none" stroke="url(#mainGrad)" stroke-width="1.5" />
        <path d="M35 28 L35 52 M23 40 L47 40 M26 31 L44 49 M26 49 L44 31" stroke="url(#mainGrad)" stroke-width="1" />

        <path d="M65 40 L72 40 L75 30 L80 50 L85 40 L95 40" fill="none" stroke="#39FF14" stroke-width="2" stroke-linecap="round" />
    </g>

    <text x="105" y="42" font-family="Segoe UI, Arial, sans-serif" font-weight="900" font-size="24" fill="#ffffff" letter-spacing="1">
        STADIUM
        <tspan fill="#39FF14" filter="url(#neonGlow)">BOOKING</tspan>
    </text>

    <text x="105" y="58" font-family="Tahoma" font-size="10" fill="#938EAE" letter-spacing="4">SMART RESERVATION</text>

    <rect x="105" y="65" width="120" height="1" fill="#39FF14" opacity="0.3" />
</svg>