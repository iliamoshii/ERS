<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <circle cx="100" cy="100" r="60" fill="none" stroke="#39FF14" stroke-width="3" filter="url(#glow)"/>

    <polygon points="100,70 120,85 115,110 85,110 80,85"
             fill="none" stroke="#39FF14" stroke-width="2" filter="url(#glow)"/>

    <line x1="100" y1="70" x2="100" y2="40" stroke="#39FF14" stroke-width="2"/>
    <line x1="120" y1="85" x2="145" y2="75" stroke="#39FF14" stroke-width="2"/>
    <line x1="115" y1="110" x2="135" y2="130" stroke="#39FF14" stroke-width="2"/>
    <line x1="85" y1="110" x2="65" y2="130" stroke="#39FF14" stroke-width="2"/>
    <line x1="80" y1="85" x2="55" y2="75" stroke="#39FF14" stroke-width="2"/>
</svg>