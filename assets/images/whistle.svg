<svg width="220" height="140" viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect x="40" y="50" width="110" height="40" rx="10"
          fill="none" stroke="#39FF14" stroke-width="3" filter="url(#glow)"/>

    <rect x="150" y="58" width="30" height="24" rx="4"
          fill="none" stroke="#39FF14" stroke-width="3" filter="url(#glow)"/>

    <circle cx="40" cy="70" r="12" fill="none" stroke="#39FF14" stroke-width="3" filter="url(#glow)"/>
</svg>