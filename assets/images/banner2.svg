<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1f2833;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect x="50" y="100" width="400" height="250" rx="20" fill="url(#grad1)" stroke="#39FF14" stroke-width="2" />
    <line x1="250" y1="100" x2="250" y2="350" stroke="#39FF14" stroke-opacity="0.5" />
    <circle cx="250" cy="225" r="40" fill="none" stroke="#39FF14" stroke-opacity="0.5" />
    <circle cx="80" cy="80" r="5" fill="#39FF14">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="420" cy="80" r="5" fill="#39FF14">
        <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
</svg>