<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Outer shield -->
    <path d="M130 20 L210 70 L210 150 L130 230 L50 150 L50 70 Z"
          fill="none" stroke="#39FF14" stroke-width="4" filter="url(#glow)"/>

    <!-- Inner ring -->
    <circle cx="130" cy="110" r="60"
            fill="none" stroke="#39FF14" stroke-width="3" filter="url(#glow)"/>

    <!-- Football hexagon -->
    <polygon points="130,80 150,95 145,120 115,120 110,95"
             fill="none" stroke="#39FF14" stroke-width="3" filter="url(#glow)"/>

    <!-- Football outer lines -->
    <line x1="130" y1="80" x2="130" y2="55" stroke="#39FF14" stroke-width="3"/>
    <line x1="150" y1="95" x2="175" y2="90" stroke="#39FF14" stroke-width="3"/>
    <line x1="145" y1="120" x2="165" y2="140" stroke="#39FF14" stroke-width="3"/>
    <line x1="115" y1="120" x2="95" y2="140" stroke="#39FF14" stroke-width="3"/>
    <line x1="110" y1="95" x2="85" y2="90" stroke="#39FF14" stroke-width="3"/>

    <!-- UI tech rings -->
    <circle cx="130" cy="110" r="85"
            fill="none" stroke="#39FF14" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
    <circle cx="130" cy="110" r="100"
            fill="none" stroke="#39FF14" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>

</svg>